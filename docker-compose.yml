version: '3.8'\n\nservices:\n  app:\n    image: node:14\n    working_dir: /usr/src/app\n    volumes:\n      - .:/usr/src/app\n    ports:\n      - '3000:3000'\n    environment:\n      - DB_HOST=db\n      - DB_PORT=5432\n      - DB_USER=your_user\n      - DB_PASSWORD=your_password\n      - DB_NAME=your_database\n    depends_on:\n      - db\n    command: npm start\n\n  db:\n    image: postgres:13\n    restart: always\n    environment:\n      - POSTGRES_USER=your_user\n      - POSTGRES_PASSWORD=your_password\n      - POSTGRES_DB=your_database\n    volumes:\n      - db_data:/var/lib/postgresql/data\n\nvolumes:\n  db_data: